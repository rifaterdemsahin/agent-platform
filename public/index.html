<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agent Platform</title>
  <style>
    :root {
      --bg: #0a0a0f;
      --surface: #13131a;
      --border: #2a2a3a;
      --text: #e4e4ed;
      --muted: #8888a0;
      --accent: #7c5cfc;
      --accent-glow: #7c5cfc55;
      --green: #34d399;
      --orange: #f59e0b;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.6;
    }
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 1.5rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    header h1 { font-size: 1.5rem; font-weight: 700; }
    header h1 span { color: var(--accent); }
    .status-dot {
      width: 10px; height: 10px;
      background: var(--green);
      border-radius: 50%;
      display: inline-block;
      margin-right: 0.5rem;
      box-shadow: 0 0 8px var(--green);
    }
    .status { color: var(--muted); font-size: 0.875rem; }
    main { max-width: 900px; margin: 2rem auto; padding: 0 1.5rem; }
    .agent-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.5rem;
      margin-bottom: 1.5rem;
      transition: border-color 0.2s;
    }
    .agent-card:hover { border-color: var(--accent); }
    .agent-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 0.75rem; }
    .agent-name { font-size: 1.25rem; font-weight: 600; }
    .agent-version { color: var(--muted); font-size: 0.8rem; background: var(--bg); padding: 0.15rem 0.5rem; border-radius: 4px; }
    .agent-desc { color: var(--muted); margin-bottom: 1rem; font-size: 0.9rem; }
    .skills { display: flex; flex-wrap: wrap; gap: 0.5rem; margin-bottom: 1rem; }
    .skill-tag {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 0.25rem 0.75rem;
      font-size: 0.8rem;
      color: var(--accent);
      cursor: pointer;
      transition: background 0.15s, box-shadow 0.15s;
    }
    .skill-tag:hover {
      background: var(--accent-glow);
      box-shadow: 0 0 10px var(--accent-glow);
    }
    .skill-detail {
      display: none;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.75rem 1rem;
      margin-top: 0.5rem;
      font-size: 0.8rem;
      color: var(--muted);
    }
    .skill-detail.open { display: block; }
    .skill-detail h4 { color: var(--text); margin-bottom: 0.25rem; }
    .skill-detail pre {
      background: #0d0d14;
      padding: 0.5rem;
      border-radius: 4px;
      overflow-x: auto;
      font-size: 0.75rem;
      margin-top: 0.5rem;
    }
    .endpoints { margin-top: 1rem; }
    .endpoints summary { cursor: pointer; color: var(--muted); font-size: 0.8rem; }
    .endpoint { font-size: 0.75rem; padding: 0.25rem 0; }
    .endpoint .method { color: var(--accent); font-weight: 600; margin-right: 0.5rem; }
    .endpoint .method.post { color: var(--orange); }
    .endpoint .path { color: var(--muted); font-family: monospace; }
    .api-section { margin-top: 2rem; padding-top: 1.5rem; border-top: 1px solid var(--border); }
    .api-section h2 { margin-bottom: 1rem; font-size: 1.1rem; }
    .trigger-badge {
      display: inline-block;
      font-size: 0.7rem;
      padding: 0.15rem 0.5rem;
      border-radius: 4px;
      background: var(--accent-glow);
      color: var(--accent);
      margin-right: 0.4rem;
    }
    footer {
      text-align: center;
      padding: 2rem;
      color: var(--muted);
      font-size: 0.8rem;
    }
  </style>
</head>
<body>
  <header>
    <h1><span>◈</span> Agent Platform</h1>
    <div class="status"><span class="status-dot"></span>Operational</div>
  </header>
  <main>
    <div id="agents-container">Loading agents...</div>
    <div class="api-section" id="api-all-skills"></div>
  </main>
  <footer>LLM-powered background agents &mdash; deployable on Fly.io</footer>
  <script>
    const API = "/api";

    async function fetchAgents() {
      try {
        const res = await fetch(`${API}/agents`);
        const data = await res.json();
        renderAgents(data.agents);
        renderAllSkills(data.agents);
      } catch (err) {
        document.getElementById("agents-container").innerHTML =
          `<p style="color:var(--orange)">Cannot connect to agent API. Is the server running?</p>`;
      }
    }

    function renderAgents(agents) {
      const container = document.getElementById("agents-container");
      container.innerHTML = agents.map(a => `
        <div class="agent-card" id="agent-${a.name}">
          <div class="agent-header">
            <div class="agent-name">${a.name}</div>
            <div class="agent-version">v${a.version}</div>
          </div>
          <div class="agent-desc">${a.description || ""}</div>
          <div style="margin-bottom:0.5rem">${(a.triggers || []).map(t => `<span class="trigger-badge">${t}</span>`).join("")}</div>
          <div class="skills">${(a.skills || []).map(s => `
            <span class="skill-tag" onclick="toggleSkill('${a.name}', '${s.name}')" title="${s.description}">${s.name}</span>
          `).join("")}</div>
          <div id="skill-detail-${a.name}"></div>
          <details class="endpoints">
            <summary>API Endpoints</summary>
            <div class="endpoint"><span class="method">GET</span><span class="path">/api/agents/${a.name}</span></div>
            <div class="endpoint"><span class="method">GET</span><span class="path">/api/agents/${a.name}/skills</span></div>
            <div class="endpoint"><span class="method">GET</span><span class="path">/api/agents/${a.name}/code</span></div>
            <div class="endpoint"><span class="method post">POST</span><span class="path">/api/agents/${a.name}/invoke</span></div>
          </details>
        </div>
      `).join("");
    }

    async function toggleSkill(agentName, skillName) {
      const detailEl = document.getElementById("skill-detail-" + agentName);
      if (detailEl.dataset.active === skillName) {
        detailEl.innerHTML = "";
        delete detailEl.dataset.active;
        return;
      }
      try {
        const res = await fetch(`${API}/agents/${agentName}/skills/${skillName}`);
        const data = await res.json();
        detailEl.innerHTML = `
          <div class="skill-detail open">
            <h4>${skillName}</h4>
            <p style="color:var(--muted)">Code: <code>${data.codePath || "—"}</code></p>
          </div>`;
        detailEl.dataset.active = skillName;
      } catch {
        detailEl.innerHTML = "";
      }
    }

    function renderAllSkills(agents) {
      const all = agents.flatMap(a => (a.skills || []).map(s => ({ ...s, agent: a.name })));
      document.getElementById("api-all-skills").innerHTML = `
        <h2>All Skills (${all.length})</h2>
        <div class="skills">
          ${all.map(s => `<span class="skill-tag" title="${s.description}">${s.agent}/${s.name}</span>`).join("")}
        </div>
        <details class="endpoints">
          <summary>Global API</summary>
          <div class="endpoint"><span class="method">GET</span><span class="path">/api/agents</span> — list all agents</div>
          <div class="endpoint"><span class="method">GET</span><span class="path">/api/skills</span> — list all skills</div>
        </details>
      `;
    }

    fetchAgents();
  </script>
</body>
</html>
